<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap');
  </style>
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>

  <div class="container">
    <img src="assets\images\illustration-article.svg" alt="Article illustration" class="blog-img">
    <div class="content">
      <div class="category">
        Learning
      </div>

      <p class="datePub">Published 21 Dec 2023</p>

      <h2 class="title"><a href="#">HTML & CSS foundations</a></h2>

      <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <div class="author-info">
      <img src="assets\images\image-avatar.webp" alt="Author's profile picture" class="author-img">
      <p class="author">Greg Hooper</p>
    </div>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/bessoAgustin">Agustín Besso</a>.
  </footer>
</body>
</html>
